<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boutique — Henefen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
    --bordeaux:#7C2333;
    --bordeaux-dark:#5C1A26;
    --ivory:#F6F2EA;
    --ivory-dim:#EFE9DE;
    --ink:#1B1714;
    --charcoal:#211C19;
    --sand:#C9A876;
    --line:rgba(27,23,20,0.14);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--ivory);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Fraunces', serif;
    font-weight:500;
    letter-spacing:-0.01em;
  }
  .eyebrow{
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--sand);
    font-weight:600;
  }

  /* ---------- Capsule marquee bar ---------- */
  .marquee-bar{
    background:var(--charcoal);
    color:var(--ivory);
    display:flex;
    align-items:center;
    height:38px;
    overflow:hidden;
    position:relative;
    font-size:12.5px;
    letter-spacing:0.03em;
  }
  .marquee-track{
    display:flex;
    align-items:center;
    white-space:nowrap;
    animation:scroll-left 22s linear infinite;
  }
  .marquee-track.paused{ animation-play-state:paused; }
  .marquee-track span{
    padding:0 28px;
    display:inline-flex;
    align-items:center;
    gap:8px;
  }
  .marquee-track span::after{
    content:"•";
    color:var(--sand);
    margin-left:28px;
  }
  @keyframes scroll-left{
    0%{ transform:translateX(0); }
    100%{ transform:translateX(-50%); }
  }
  .pause-btn{
    position:absolute;
    right:14px;
    top:0; bottom:0;
    display:flex;
    align-items:center;
    background:none;
    border:none;
    color:var(--ivory);
    cursor:pointer;
    z-index:2;
    padding:0 6px;
  }
  .pause-btn::before{
    content:"";
    position:absolute;
    left:-24px; top:0; bottom:0; width:24px;
    background:linear-gradient(to right, transparent, var(--charcoal) 80%);
  }
  .pause-btn svg{ width:14px; height:14px; }

  /* ---------- Top nav ---------- */
  .nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 22px;
    border-bottom:1px solid var(--line);
    background:var(--ivory);
  }
  .nav-icon-btn{
    background:none; border:none; cursor:pointer;
    color:var(--ink);
    display:flex; align-items:center;
  }
  .nav-icon-btn svg{ width:20px; height:20px; }
  .nav-right{ display:flex; gap:18px; align-items:center; }
  .logo-wordmark{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:500;
    font-size:26px;
    letter-spacing:0.01em;
    color:var(--bordeaux);
    text-decoration:none;
  }
  .logo-wrap{ text-align:center; }
  .logo-sub{
    font-size:8.5px;
    letter-spacing:0.32em;
    color:var(--ink);
    text-transform:uppercase;
    display:block;
    margin-top:-2px;
  }

  /* signature squiggle — echoes the logo's underline stroke */
  .squiggle{
    display:block;
    width:64px;
    height:12px;
    margin:10px auto 0;
  }
  .squiggle path{
    fill:none;
    stroke:var(--bordeaux);
    stroke-width:2.4;
    stroke-linecap:round;
  }

  /* ---------- Hero ---------- */
  .hero{
    position:relative;
    height:78vh;
    min-height:460px;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(124,35,51,0.35), transparent 55%),
      linear-gradient(160deg, #2b2420 0%, #1b1714 55%, #120f0d 100%);
    display:flex;
    align-items:flex-end;
    overflow:hidden;
  }
  .hero::after{
    content:"";
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(115deg, rgba(255,255,255,0.035) 0px, rgba(255,255,255,0.035) 1px, transparent 1px, transparent 60px);
  }
  .hero-content{
    position:relative;
    z-index:2;
    padding:0 24px 44px;
    color:var(--ivory);
  }
  .hero-content .eyebrow{ color:var(--sand); }
  .hero h1{
    font-size:clamp(34px, 9vw, 52px);
    line-height:1.05;
    margin:10px 0 16px;
    max-width:11ch;
  }
  .hero p{
    font-size:14.5px;
    line-height:1.6;
    max-width:34ch;
    color:rgba(246,242,234,0.82);
    margin-bottom:22px;
  }
  .btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:var(--bordeaux);
    color:var(--ivory);
    border:none;
    padding:14px 24px;
    font-size:12.5px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    cursor:pointer;
    font-family:'Inter', sans-serif;
    font-weight:600;
    transition:background .2s ease;
  }
  .btn:hover{ background:var(--bordeaux-dark); }
  .btn.ghost{
    background:transparent;
    border:1px solid rgba(246,242,234,0.5);
  }

  /* ---------- Category strip ---------- */
  .section{ padding:56px 22px; }
  .section-head{ margin-bottom:26px; }
  .section-head h2{ font-size:24px; margin-top:6px; }

  .cat-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:12px;
  }
  .cat-tile{
    position:relative;
    aspect-ratio:3/4;
    background:linear-gradient(155deg, #E4D9C4, #C9A876 65%, #B08F5C);
    display:flex;
    align-items:flex-end;
    padding:14px;
    overflow:hidden;
  }
  .cat-tile:nth-child(2){ background:linear-gradient(155deg, #3A2C2C, var(--bordeaux) 70%, var(--bordeaux-dark)); }
  .cat-tile:nth-child(3){ background:linear-gradient(155deg, #d8cdb8, #a98f68 70%, #7c6742); }
  .cat-tile:nth-child(4){ background:linear-gradient(155deg, #241d1a, #4a1e28 65%, var(--bordeaux-dark)); }
  .cat-tile span{
    color:var(--ivory);
    font-family:'Fraunces', serif;
    font-size:16px;
    font-style:italic;
  }
  .cat-tile small{
    position:absolute; top:14px; left:14px;
    color:rgba(246,242,234,0.7);
    font-size:10px;
    letter-spacing:0.1em;
    text-transform:uppercase;
  }

  /* ---------- Ensemble builder teaser ---------- */
  .builder{
    background:var(--charcoal);
    color:var(--ivory);
    padding:56px 22px;
  }
  .builder .eyebrow{ color:var(--sand); }
  .builder h2{ font-size:24px; margin:8px 0 14px; color:var(--ivory); }
  .builder p{ font-size:14px; line-height:1.6; color:rgba(246,242,234,0.75); max-width:38ch; margin-bottom:24px;}
  .builder-pair{
    display:flex;
    gap:10px;
    align-items:center;
  }
  .builder-piece{
    flex:1;
    aspect-ratio:3/4;
    background:linear-gradient(160deg, #3a322c, #241d1a);
    border:1px solid rgba(246,242,234,0.14);
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:10px;
    font-size:11px;
    letter-spacing:0.04em;
  }
  .builder-piece b{ font-family:'Fraunces', serif; font-weight:500; font-style:italic; font-size:14px; display:block; margin-bottom:2px; }
  .builder-plus{ color:var(--sand); font-size:20px; font-family:'Fraunces', serif; }

  /* ---------- Product card demo ---------- */
  .product-demo{ padding:56px 22px 64px; }
  .product-card{
    max-width:400px;
    margin:0 auto;
  }
  .product-main-photo{
    aspect-ratio:4/5;
    background:linear-gradient(150deg, #efe6d4, #C9A876 60%, #8f7248);
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    color:rgba(27,23,20,0.35);
    font-size:12px;
    letter-spacing:0.08em;
  }
  .dots{
    position:absolute;
    bottom:12px; left:0; right:0;
    display:flex;
    justify-content:center;
    gap:6px;
  }
  .dots span{
    width:6px; height:6px; border-radius:50%;
    background:rgba(27,23,20,0.25);
  }
  .dots span.active{ background:var(--bordeaux); width:16px; border-radius:3px; }

  .thumb-row{
    display:flex;
    gap:8px;
    margin-top:8px;
    overflow-x:auto;
    padding-bottom:2px;
  }
  .thumb{
    flex:0 0 56px;
    aspect-ratio:3/4;
    background:linear-gradient(150deg,#e7dcc4,#b89a6a);
    cursor:pointer;
    border:2px solid transparent;
    opacity:0.65;
  }
  .thumb.active{ border-color:var(--bordeaux); opacity:1; }

  .product-info{ padding:16px 2px 0; }
  .product-info h3{
    font-size:17px;
    font-weight:500;
    margin-bottom:4px;
  }
  .product-info .desc{ font-size:12.5px; color:rgba(27,23,20,0.6); margin-bottom:10px;}
  .price-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:12px;
  }
  .price{ font-family:'Fraunces', serif; font-size:19px; }
  .currency-select{
    font-size:11px;
    letter-spacing:0.06em;
    border:1px solid var(--line);
    background:transparent;
    padding:6px 10px;
    color:var(--ink);
    font-family:'Inter', sans-serif;
  }
  .swatches{ display:flex; gap:8px; margin-bottom:16px; }
  .swatch{
    width:20px; height:20px;
    border-radius:50%;
    border:2px solid transparent;
    cursor:pointer;
    position:relative;
  }
  .swatch.active{ border-color:var(--ink); }
  .swatch.active::after{
    content:""; position:absolute; inset:3px; border-radius:50%; border:1.5px solid var(--ivory);
  }
  .mix-btn{
    width:100%;
    border:1px solid var(--ink);
    background:transparent;
    padding:13px;
    font-size:11.5px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    font-weight:600;
    cursor:pointer;
    margin-bottom:8px;
  }

  /* ---------- Footer ---------- */
  footer{
    background:var(--ink);
    color:var(--ivory);
    padding:48px 22px 30px;
    text-align:center;
  }
  footer .logo-wordmark{ color:var(--ivory); font-size:22px; }
  .footer-tagline{ font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:rgba(246,242,234,0.5); margin-top:6px; }
  .social-row{
    display:flex;
    justify-content:center;
    gap:20px;
    margin:28px 0 24px;
  }
  .social-row a{
    color:var(--ivory);
    opacity:0.75;
    display:flex;
  }
  .social-row svg{ width:19px; height:19px; }
  .footer-contact{ font-size:12.5px; color:rgba(246,242,234,0.6); margin-bottom:6px; }
  .footer-legal{ font-size:10.5px; color:rgba(246,242,234,0.35); margin-top:20px; }

  .burger-menu{
    position:fixed; inset:0;
    background:rgba(27,23,20,0.6);
    z-index:50;
    display:none;
  }
  .burger-menu.open{ display:block; }
  .burger-panel{
    position:absolute; left:0; top:0; bottom:0;
    width:78%;
    max-width:320px;
    background:var(--ivory);
    padding:26px 24px;
    display:flex;
    flex-direction:column;
  }
  .burger-close{ align-self:flex-end; background:none; border:none; font-size:22px; cursor:pointer; color:var(--ink); margin-bottom:24px; }
  .burger-panel a{
    color:var(--ink);
    text-decoration:none;
    font-family:'Fraunces', serif;
    font-size:19px;
    font-style:italic;
    padding:12px 0;
    border-bottom:1px solid var(--line);
  }
  .burger-panel .burger-note{
    margin-top:auto;
    font-size:11px;
    color:rgba(27,23,20,0.5);
    letter-spacing:0.04em;
    line-height:1.6;
  }


  .filters{
    display:flex; gap:8px; overflow-x:auto; padding:18px 22px 6px;
    border-bottom:1px solid var(--line);
  }
  .filter-chip{
    flex:0 0 auto;
    padding:8px 16px;
    border:1px solid var(--ink);
    background:transparent;
    font-size:11.5px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    cursor:pointer;
    font-family:'Inter', sans-serif;
    white-space:nowrap;
  }
  .filter-chip.active{ background:var(--ink); color:var(--ivory); }
  .grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:14px;
    padding:20px 22px 60px;
  }
  .grid-card{ cursor:pointer; }
  .grid-photo{
    aspect-ratio:3/4;
    background:linear-gradient(150deg,#efe6d4,#C9A876 60%,#8f7248);
    margin-bottom:8px;
    position:relative;
  }
  .grid-card h4{ font-size:13px; font-weight:500; margin-bottom:2px; }
  .grid-card .price{ font-size:12.5px; color:rgba(27,23,20,0.6); font-family:'Inter', sans-serif; }
  .grid-colors{ display:flex; gap:5px; margin-top:6px; }
  .grid-colors span{ width:11px; height:11px; border-radius:50%; display:inline-block; }
  .state-msg{ padding:40px 22px; text-align:center; font-size:13px; color:rgba(27,23,20,0.5); }

  @media (min-width:860px){
    .nav{ max-width:1200px; margin:0 auto; }
    .filters{ max-width:1200px; margin:0 auto; }
    .grid{ max-width:1200px; margin:0 auto; grid-template-columns:repeat(4, 1fr); gap:22px; padding:24px 48px 80px; }
  }
</style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-icon-btn" aria-label="Retour">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M15 5l-7 7 7 7"/></svg>
    </a>
    <div class="logo-wrap">
      <a href="/" class="logo-wordmark">Henefen</a>
      <span class="logo-sub">Made in Senegal</span>
    </div>
    <div class="nav-right">
      <a href="/panier/" class="nav-icon-btn" aria-label="Panier">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8V6a3 3 0 016 0v2"/></svg>
      </a>
    </div>
  </nav>

  <div class="filters" id="filters">
    <button class="filter-chip active" data-cat="">Tout</button>
    <button class="filter-chip" data-cat="casual">Casual</button>
    <button class="filter-chip" data-cat="diner">Dîner</button>
    <button class="filter-chip" data-cat="ceremonie">Cérémonie</button>
    <button class="filter-chip" data-cat="traditionnel">Traditionnel</button>
  </div>

  <div id="content">
    <div class="state-msg">Chargement des articles…</div>
  </div>

<script>
  const content = document.getElementById('content');
  const filters = document.getElementById('filters');

  async function loadProducts(category) {
    content.innerHTML = '<div class="state-msg">Chargement des articles…</div>';
    try {
      const url = category ? `/api/products?category=${category}` : '/api/products';
      const res = await fetch(url);
      if (!res.ok) throw new Error('reponse-non-ok');
      const data = await res.json();
      renderGrid(data.products);
    } catch (err) {
      content.innerHTML = '<div class="state-msg">Impossible de charger le catalogue pour le moment.<br>Vérifie que la base D1 est bien liée à ce déploiement.</div>';
    }
  }

  function renderGrid(products) {
    if (!products || products.length === 0) {
      content.innerHTML = '<div class="state-msg">Aucun article dans cette catégorie pour l’instant.</div>';
      return;
    }
    const grid = document.createElement('div');
    grid.className = 'grid';
    products.forEach(p => {
      const card = document.createElement('a');
      card.className = 'grid-card';
      card.href = `/produit/?slug=${p.slug}`;
      const colorDots = (p.colors || []).map(c => `<span style="background:${c.hex}"></span>`).join('');
      const photoStyle = p.photo_url ? `style="background-image:url('${p.photo_url}'); background-size:cover; background-position:center;"` : '';
      card.innerHTML = `
        <div class="grid-photo" ${photoStyle}></div>
        <h4>${p.name}</h4>
        <div class="price">${p.price_fcfa.toLocaleString('fr-FR')} FCFA</div>
        <div class="grid-colors">${colorDots}</div>
      `;
      grid.appendChild(card);
    });
    content.innerHTML = '';
    content.appendChild(grid);
  }

  filters.addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-chip');
    if (!btn) return;
    filters.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadProducts(btn.dataset.cat);
  });

  const initialCategory = new URLSearchParams(window.location.search).get('category') || '';
  if (initialCategory) {
    filters.querySelectorAll('.filter-chip').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === initialCategory);
    });
  }
  loadProducts(initialCategory);
</script>
</body>
</html>
